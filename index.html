<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZooSmith V2</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #e5e7eb; padding: 20px; }
        .header { display: flex; gap: 20px; margin-bottom: 20px; font-size: 1.2rem; flex-wrap: wrap; }
        .stat { background: #1e293b; padding: 10px 15px; border-radius: 8px; }
        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; background: #22c55e; color: #000; border: none; border-radius: 8px; font-weight: bold; }
        button:hover { background: #16a34a; }
        #log { margin-top: 20px; background: #000; padding: 15px; border-radius: 8px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="header">
        <div class="stat">💰 $<span id="money">10,000</span></div>
        <div class="stat">📅 Day <span id="day">1</span></div>
        <div class="stat">⭐ <span id="rating">50</span>%</div>
        <div class="stat">😊 <span id="satisfaction">80</span>%</div>
    </div>

    <button id="endDayBtn">⏭ End Day</button>

    <!-- V2 Status Panels -->
    <div id="staffStatus" style="margin-top: 20px; background: #1e293b; padding: 15px; border-radius: 8px;"></div>
    <div id="foodStatus" style="margin-top: 20px; background: #1e293b; padding: 15px; border-radius: 8px;"></div>
    <div id="exhibitStatus" style="margin-top: 20px; background: #1e293b; padding: 15px; border-radius: 8px;"></div>
    <div id="visitorStatus" style="margin-top: 20px; background: #1e293b; padding: 15px; border-radius: 8px;"></div>

    <div id="shop" class="section active" style="margin-top: 20px;"></div>
    
    <div id="log"></div>

    <script type="module" src="./js/main.js"></script>

    <div id="buyModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: #1e293b; padding: 30px; border-radius: 12px; max-width: 500px; width: 90%; border: 2px solid #334155;">
        <h3 style="margin-top: 0; color: #e5e7eb;">Select Exhibit</h3>
        <select id="exhibitSelect" style="width: 100%; padding: 10px; margin-bottom: 15px; background: #0f172a; color: #e5e7eb; border: 1px solid #334155; border-radius: 8px;"></select>
        <select id="genderSelect" style="width: 100%; padding: 10px; margin-bottom: 15px; background: #0f172a; color: #e5e7eb; border: 1px solid #334155; border-radius: 8px;">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
        <div style="display: flex; gap: 10px;">
            <button onclick="confirmBuyAnimal()" style="flex: 1; padding: 12px; background: #22c55e; color: #000; border: none; border-radius: 8px; font-weight: 700; cursor: pointer;">Confirm</button>
            <button onclick="closeBuyModal()" style="flex: 1; padding: 12px; background: #ef4444; color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer;">Cancel</button>
        </div>
    </div>
</div>

<style>
    .modal.active {
        display: flex !important;
    }
</style>
    
</body>
</html>
